<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Scrabble Fire</title>
    <style>
        /* ── RESET & ROOT ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #0f0808;
            --panel:     #1a0d0d;
            --border:    #8b0000;
            --orange:    #ff4500;
            --yellow:    #ffcc00;
            --dim:       #555;
            --cell-size: 38px;
            --font:      'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── SCREENS ── */
        .screen { display: none; width: 100%; }
        .screen.active { display: flex; flex-direction: column; align-items: center; }

        /* ════════════════════════════
           LOBBY SCREEN
        ════════════════════════════ */
        #lobby-screen {
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .lobby-card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 40px rgba(255,69,0,0.3);
        }
        .logo {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 0 0 20px #8b0000, 0 0 40px #ff4500;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .tagline {
            text-align: center;
            color: var(--dim);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
        .field-label {
            display: block;
            font-size: 0.8rem;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .field-input {
            width: 100%;
            background: #0f0808;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
        .field-input:focus { border-color: var(--orange); }
        .btn {
            width: 100%;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #e03d00; }
        .btn:active { transform: scale(0.98); }
        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--orange);
            margin-top: 10px;
        }
        .btn.secondary:hover { background: rgba(255,69,0,0.1); }
        .divider {
            text-align: center;
            color: var(--dim);
            margin: 18px 0;
            font-size: 0.85rem;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #333;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* Room list */
        #room-list-container { margin-top: 24px; }
        #room-list-container h3 {
            font-size: 0.8rem;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,69,0,0.07);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .room-item:hover { border-color: var(--orange); background: rgba(255,69,0,0.12); }
        .room-item .room-id { font-weight: 700; color: #fff; font-size: 0.95rem; }
        .room-item .room-meta { font-size: 0.8rem; color: var(--dim); }
        .room-badge {
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--orange);
            color: #fff;
            border-radius: 4px;
            padding: 2px 8px;
        }
        .room-badge.started { background: #555; }
        #no-rooms { color: var(--dim); font-size: 0.9rem; text-align: center; padding: 10px 0; }
        .error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 8px; text-align: center; min-height: 20px; }

        /* ════════════════════════════
           GAME SCREEN
        ════════════════════════════ */
        #game-screen { padding: 12px 16px 30px; min-height: 100vh; }

        /* Top bar */
        .topbar {
            width: 100%;
            max-width: 1300px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .topbar-logo { font-size: 1.4rem; font-weight: 900; color: var(--orange); text-shadow: 0 0 10px #8b0000; }
        .topbar-info { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .player-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            border: 2px solid;
        }
        .room-tag { color: var(--dim); font-size: 0.8rem; }

        /* Timer */
        #timer-display {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--yellow);
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            text-align: center;
        }
        #timer-display.urgent { color: #ff4444; animation: blink 0.5s step-end infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Layout */
        .game-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Grid */
        #grid-wrapper {
            background: #1a0a0a;
            border: 4px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255,69,0,0.35);
            padding: 8px;
            flex-shrink: 0;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            gap: 2px;
            background: #333;
        }
        .cell-container {
            position: relative;
            width: var(--cell-size);
            height: var(--cell-size);
            background: #000;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 9px;
            color: var(--yellow);
            z-index: 10;
            pointer-events: none;
            line-height: 1;
        }
        .cell {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            padding: 0;
            display: none;
            cursor: default;
        }
        .cell.active {
            display: block;
            background: #1a1a1a;
            cursor: text;
        }
        .cell.active:focus {
            background: #2a2a2a;
            box-shadow: inset 0 0 8px var(--orange);
        }
        .cell.locked {
            cursor: default;
            font-weight: 900;
        }
        .cell.typing-other {
            animation: pulse-other 0.5s ease-out;
        }
        @keyframes pulse-other {
            0%   { box-shadow: 0 0 0px rgba(0,207,255,0); }
            50%  { box-shadow: inset 0 0 10px rgba(0,207,255,0.8); }
            100% { box-shadow: 0 0 0px rgba(0,207,255,0); }
        }
        @keyframes word-pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .cell.word-pop { animation: word-pop 0.4s ease-out; }

        /* Sidebar */
        .sidebar {
            width: 310px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex-shrink: 0;
        }
        .panel {
            background: var(--panel);
            padding: 16px;
            border-radius: 10px;
            border-top: 3px solid var(--orange);
        }
        .panel h2 {
            font-size: 0.85rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Players online */
        #players-list { list-style: none; }
        #players-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }
        #players-list li:last-child { border-bottom: none; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .player-score { margin-left: auto; font-weight: 700; color: var(--yellow); }

        /* Clues */
        .clue-section-title { font-size: 0.75rem; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 4px; }
        .clue-list { max-height: 320px; overflow-y: auto; }
        .clue-list::-webkit-scrollbar { width: 4px; }
        .clue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .clue-item {
            padding: 6px 0;
            border-bottom: 1px solid #1f1f1f;
            font-size: 0.82rem;
            line-height: 1.4;
            color: #ccc;
            cursor: pointer;
            transition: color 0.15s;
        }
        .clue-item:hover { color: #fff; }
        .clue-item:last-child { border-bottom: none; }
        .clue-item.completed { text-decoration: line-through; color: var(--dim); cursor: default; }
        .clue-item.completed:hover { color: var(--dim); }
        .clue-item .solved-by { font-size: 0.72rem; font-weight: 700; }

        /* Toast notification */
        #toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #111;
            border-left: 4px solid var(--orange);
            color: #eee;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.88rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: slide-in 0.25s ease-out, fade-out 0.4s ease-in 2.6s forwards;
            max-width: 280px;
        }
        @keyframes slide-in { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fade-out { to { opacity: 0; transform: translateY(-8px); } }

        /* ════════════════════════════
           GAME OVER SCREEN
        ════════════════════════════ */
        #gameover-screen {
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .gameover-card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,69,0,0.4);
        }
        .gameover-title { font-size: 2rem; font-weight: 900; color: var(--orange); margin-bottom: 4px; }
        .gameover-reason { color: var(--dim); margin-bottom: 24px; font-size: 0.9rem; }
        .winner-banner {
            background: rgba(255,204,0,0.1);
            border: 2px solid var(--yellow);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 24px;
        }
        .winner-banner .trophy { font-size: 2rem; }
        .winner-banner .winner-name { font-size: 1.5rem; font-weight: 900; color: var(--yellow); }
        .rankings { list-style: none; text-align: left; margin-bottom: 24px; }
        .rankings li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }
        .rankings li .rank-num { font-size: 1.1rem; font-weight: 900; color: var(--dim); min-width: 24px; }
        .rankings li.rank-1 { background: rgba(255,204,0,0.08); }
        .rankings li.rank-1 .rank-num { color: var(--yellow); }
        .rankings li .rank-score { margin-left: auto; font-weight: 700; color: var(--yellow); }
    </style>
</head>
<body>

<!-- ═══════════ LOBBY ═══════════ -->
<div id="lobby-screen" class="screen active">
    <div class="lobby-card">
        <div class="logo">🔥 SCRABBLE FIRE</div>
        <div class="tagline">Teka-teki silang multiplayer real-time</div>

        <label class="field-label">Nama Pemain</label>
        <input id="inp-username" class="field-input" placeholder="Masukkan nama kamu..." maxlength="20" autocomplete="off">

        <label class="field-label">ID Room</label>
        <input id="inp-room" class="field-input" placeholder="Ketik ID room baru atau pilih di bawah..." maxlength="20" autocomplete="off">

        <button class="btn" onclick="joinRoom()">🚀 Masuk / Buat Room</button>
        <div id="lobby-error" class="error-msg"></div>

        <div class="divider">atau pilih room aktif</div>

        <div id="room-list-container">
            <h3>Room Tersedia</h3>
            <div id="room-list"><div id="no-rooms">Memuat daftar room...</div></div>
        </div>
    </div>
</div>

<!-- ═══════════ GAME ═══════════ -->
<div id="game-screen" class="screen">
    <div class="topbar">
        <div class="topbar-logo">🔥 SCRABBLE FIRE</div>
        <div class="topbar-info">
            <span id="topbar-player" class="player-badge"></span>
            <span id="topbar-room" class="room-tag"></span>
        </div>
        <div id="timer-display">3:00</div>
    </div>

    <div class="game-layout">
        <div id="grid-wrapper">
            <div id="grid"></div>
        </div>

        <div class="sidebar">
            <!-- Players online -->
            <div class="panel">
                <h2>Pemain Online</h2>
                <ul id="players-list"></ul>
            </div>

            <!-- Clues -->
            <div class="panel">
                <h2>Pertanyaan</h2>
                <div class="clue-list">
                    <div class="clue-section-title">Mendatar</div>
                    <ul id="list-across"></ul>
                    <div class="clue-section-title" style="margin-top:14px">Menurun</div>
                    <ul id="list-down"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════ GAME OVER ═══════════ -->
<div id="gameover-screen" class="screen">
    <div class="gameover-card">
        <div class="gameover-title">🏁 Permainan Selesai</div>
        <div id="gameover-reason" class="gameover-reason"></div>
        <div class="winner-banner">
            <div class="trophy">🏆</div>
            <div style="font-size:0.8rem;color:var(--dim);margin-bottom:4px">PEMENANG</div>
            <div id="winner-name" class="winner-name"></div>
        </div>
        <ul id="final-rankings" class="rankings"></ul>
        <button class="btn" onclick="backToLobby()">🔁 Kembali ke Lobby</button>
    </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Socket.io -->
<script src="/socket.io/socket.io.js"></script>
<script>
// ────────────────────────────────────────────────
//  STATE
// ────────────────────────────────────────────────
const socket = io();
let myUsername = '';
let myColor    = '#ff4500';
let myRoomId   = '';
let gameState  = { soal: [], grid: {}, completedWords: {}, scores: {} };

// ────────────────────────────────────────────────
//  SCREEN HELPERS
// ────────────────────────────────────────────────
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ────────────────────────────────────────────────
//  LOBBY
// ────────────────────────────────────────────────
socket.on('connect', () => {
    socket.emit('get_rooms');
});

socket.on('room_list', (rooms) => {
    const container = document.getElementById('room-list');
    if (!rooms.length) {
        container.innerHTML = '<div id="no-rooms">Belum ada room aktif. Buat room baru!</div>';
        return;
    }
    container.innerHTML = rooms.map(r => `
        <div class="room-item" onclick="pickRoom('${r.id}')">
            <div>
                <div class="room-id">${r.id}</div>
                <div class="room-meta">${r.playerCount}/${r.maxPlayers} pemain</div>
            </div>
            <span class="room-badge ${r.gameStarted ? 'started' : ''}">
                ${r.gameStarted ? 'Berlangsung' : 'Menunggu'}
            </span>
        </div>`).join('');
});

function pickRoom(id) {
    document.getElementById('inp-room').value = id;
}

function joinRoom() {
    const username = document.getElementById('inp-username').value.trim();
    const roomId   = document.getElementById('inp-room').value.trim();
    const errEl    = document.getElementById('lobby-error');

    if (!username) { errEl.textContent = 'Masukkan nama pemain dulu!'; return; }
    if (!roomId)   { errEl.textContent = 'Masukkan ID room dulu!'; return; }

    errEl.textContent = '';
    myUsername = username;
    myRoomId   = roomId;

    socket.emit('join_room', { roomId, username });
}

socket.on('join_error', ({ message }) => {
    document.getElementById('lobby-error').textContent = message;
});

// ────────────────────────────────────────────────
//  GRID CONSTRUCTION (once, on lobby → game transition)
// ────────────────────────────────────────────────
let gridBuilt = false;
function buildGrid() {
    if (gridBuilt) return;
    gridBuilt = true;

    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';

    for (let r = 1; r <= 15; r++) {
        for (let c = 1; c <= 15; c++) {
            const container = document.createElement('div');
            container.className = 'cell-container';
            container.id = `cont-${r}-${c}`;

            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'cell';
            input.id = `cell-${r}-${c}`;
            input.dataset.row = r;
            input.dataset.col = c;
            input.readOnly = true; // unlocked by renderBoard()

            input.addEventListener('input', (e) => {
                const char = e.target.value.replace(/[^a-zA-Z]/g, '');
                e.target.value = char.toUpperCase();
                if (char) {
                    socket.emit('cell_update', { row: r, col: c, char: char.toUpperCase() });
                    focusNext(r, c);
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value) focusPrev(r, c);
                if (e.key === 'ArrowRight') { e.preventDefault(); focusNextInWord(r, c, 'across'); }
                if (e.key === 'ArrowLeft')  { e.preventDefault(); focusPrevInWord(r, c, 'across'); }
                if (e.key === 'ArrowDown')  { e.preventDefault(); focusNextInWord(r, c, 'down'); }
                if (e.key === 'ArrowUp')    { e.preventDefault(); focusPrevInWord(r, c, 'down'); }
            });

            container.appendChild(input);
            gridEl.appendChild(container);
        }
    }
}

// ────────────────────────────────────────────────
//  GAME STATE RECEIVED (after join)
// ────────────────────────────────────────────────
socket.on('game_state', (data) => {
    gameState = data;
    myColor = data.myColor;

    buildGrid();
    showScreen('game-screen');

    // Topbar
    const badge = document.getElementById('topbar-player');
    badge.textContent = myUsername;
    badge.style.color = myColor;
    badge.style.borderColor = myColor;
    document.getElementById('topbar-room').textContent = `Room: ${myRoomId}`;

    updateTimer(data.timeLeft);
    renderBoard();
    renderClues();
    renderPlayers(data.scores);
});

// ────────────────────────────────────────────────
//  RENDER BOARD
// ────────────────────────────────────────────────
function renderBoard() {
    // Reset all cells
    document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('active', 'locked');
        cell.style.color = '';
        cell.style.background = '';
        cell.readOnly = true;
        cell.value = '';
    });
    document.querySelectorAll('.cell-number').forEach(n => n.remove());

    gameState.soal.forEach(s => {
        // Number label
        const startCont = document.getElementById(`cont-${s.row}-${s.col}`);
        if (startCont && !startCont.querySelector('.cell-number')) {
            const numDiv = document.createElement('div');
            numDiv.className = 'cell-number';
            numDiv.innerText = s.number;
            startCont.appendChild(numDiv);
        }

        for (let i = 0; i < s.answer.length; i++) {
            let r = s.row, c = s.col;
            if (s.direction === 'across') c += i;
            else r += i;

            const input = document.getElementById(`cell-${r}-${c}`);
            input.classList.add('active');
            input.readOnly = false;

            const cellId = `${r}-${c}`;
            const cellData = gameState.grid[cellId];
            if (cellData) {
                input.value = cellData.char;
                if (cellData.locked) {
                    input.classList.add('locked');
                    input.readOnly = true;
                    if (cellData.lockedColor) {
                        input.style.color = cellData.lockedColor;
                        input.style.textShadow = `0 0 8px ${cellData.lockedColor}`;
                    }
                }
            }
        }
    });
}

// ────────────────────────────────────────────────
//  RENDER CLUES
// ────────────────────────────────────────────────
function renderClues() {
    const listAcross = document.getElementById('list-across');
    const listDown   = document.getElementById('list-down');
    listAcross.innerHTML = '';
    listDown.innerHTML   = '';

    gameState.soal.forEach(s => {
        const isDone   = gameState.completedWords[s.id];
        const solverColor = isDone && gameState.scores[isDone] ? gameState.scores[isDone].color : '#fff';
        const li = document.createElement('li');
        li.className = `clue-item ${isDone ? 'completed' : ''}`;
        li.dataset.wordId = s.id;
        li.innerHTML = `<strong>${s.number}.</strong> ${s.clue}`
            + (isDone ? ` <span class="solved-by" style="color:${solverColor}"> ✓ ${isDone}</span>` : '');

        if (!isDone) {
            li.onclick = () => focusWord(s);
        }

        if (s.direction === 'across') listAcross.appendChild(li);
        else listDown.appendChild(li);
    });
}

// ────────────────────────────────────────────────
//  RENDER PLAYERS
// ────────────────────────────────────────────────
function renderPlayers(scores) {
    const list = document.getElementById('players-list');
    list.innerHTML = '';

    // scores: { username: { score, color } }
    const entries = Object.entries(scores).sort((a,b) => b[1].score - a[1].score);

    if (!entries.length) {
        list.innerHTML = '<li style="color:var(--dim);font-size:0.85rem">Belum ada pemain</li>';
        return;
    }

    entries.forEach(([name, data]) => {
        const li = document.createElement('li');
        const isSelf = name === myUsername;
        li.innerHTML = `
            <span class="dot" style="background:${data.color}"></span>
            <span style="${isSelf ? 'font-weight:700;color:#fff' : ''}">${name}${isSelf ? ' (kamu)' : ''}</span>
            <span class="player-score">${data.score}</span>`;
        list.appendChild(li);
    });
}

// ────────────────────────────────────────────────
//  SOCKET EVENTS
// ────────────────────────────────────────────────
socket.on('player_joined', ({ username, players }) => {
    if (username !== myUsername) showToast(`${username} bergabung 👋`);
    // Rebuild scores map from players array for renderPlayers
    const sc = {};
    players.forEach(p => sc[p.username] = { score: p.score, color: p.color });
    renderPlayers(sc);
});

socket.on('player_left', ({ username, players }) => {
    showToast(`${username} meninggalkan room`);
    const sc = {};
    players.forEach(p => sc[p.username] = { score: p.score, color: p.color });
    renderPlayers(sc);
});

socket.on('cell_updated', ({ row, col, char, username }) => {
    const input = document.getElementById(`cell-${row}-${col}`);
    if (!input) return;
    input.value = char;
    input.classList.add('typing-other');
    setTimeout(() => input.classList.remove('typing-other'), 500);

    // Also update local grid state
    gameState.grid[`${row}-${col}`] = { char, locked: false, lastBy: username };
});

socket.on('word_completed', (data) => {
    const { wordId, username, scores, answer, direction, row, col, color, pointsEarned } = data;
    gameState.completedWords[wordId] = username;
    gameState.scores = scores;

    // Update grid locked state
    for (let i = 0; i < answer.length; i++) {
        let r = row, c = col;
        if (direction === 'across') c += i;
        else r += i;
        const cellId = `${r}-${c}`;
        gameState.grid[cellId] = { char: answer[i], locked: true, lockedBy: username, lockedColor: color };

        const input = document.getElementById(`cell-${r}-${c}`);
        if (input) {
            input.value = answer[i];
            input.classList.add('locked', 'word-pop');
            input.readOnly = true;
            input.style.color = color;
            input.style.textShadow = `0 0 8px ${color}`;
            setTimeout(() => input.classList.remove('word-pop'), 400);
        }
    }

    renderClues();
    renderPlayers(scores);

    const isSelf = username === myUsername;
    showToast(
        isSelf
            ? `🎉 Kamu menjawab kata ${answer}! +${pointsEarned} poin`
            : `✅ ${username} menjawab "${answer}"!`,
        isSelf ? color : null
    );
});

socket.on('timer_update', ({ timeLeft }) => {
    updateTimer(timeLeft);
});

socket.on('game_over', ({ reason, rankings, winner }) => {
    showGameOver(reason, rankings, winner);
});

// ────────────────────────────────────────────────
//  TIMER
// ────────────────────────────────────────────────
function updateTimer(seconds) {
    const el = document.getElementById('timer-display');
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    el.textContent = `${m}:${String(s).padStart(2, '0')}`;
    el.classList.toggle('urgent', seconds <= 30);
}

// ────────────────────────────────────────────────
//  GAME OVER
// ────────────────────────────────────────────────
function showGameOver(reason, rankings, winner) {
    document.getElementById('gameover-reason').textContent = reason;
    document.getElementById('winner-name').textContent = winner || '-';

    const ul = document.getElementById('final-rankings');
    ul.innerHTML = '';
    rankings.forEach(r => {
        const li = document.createElement('li');
        li.className = `rank-${r.rank}`;
        li.innerHTML = `
            <span class="rank-num">${r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : r.rank}</span>
            <span class="dot" style="background:${r.color}"></span>
            <span>${r.username}</span>
            <span class="rank-score">${r.score} poin</span>`;
        ul.appendChild(li);
    });

    showScreen('gameover-screen');
}

function backToLobby() {
    location.reload();
}

// ────────────────────────────────────────────────
//  TOAST
// ────────────────────────────────────────────────
function showToast(msg, color) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    if (color) toast.style.borderLeftColor = color;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ────────────────────────────────────────────────
//  FOCUS HELPERS
// ────────────────────────────────────────────────
function getActiveWordAt(r, c, preferDirection) {
    // Prefer the direction the user is typing, then any direction
    const candidates = gameState.soal.filter(s => {
        if (s.direction === 'across') return r === s.row && c >= s.col && c < s.col + s.answer.length;
        return c === s.col && r >= s.row && r < s.row + s.answer.length;
    });
    if (!candidates.length) return null;
    return candidates.find(s => s.direction === preferDirection) || candidates[0];
}

// Track last direction per cell for cleaner focus flow
let lastDirection = 'across';

function focusNext(r, c) {
    const word = getActiveWordAt(r, c, lastDirection);
    if (!word) return;
    lastDirection = word.direction;
    let nr = r, nc = c;
    if (word.direction === 'across') nc++; else nr++;
    const next = document.getElementById(`cell-${nr}-${nc}`);
    if (next && next.classList.contains('active') && !next.readOnly) next.focus();
}

function focusPrev(r, c) {
    const word = getActiveWordAt(r, c, lastDirection);
    if (!word) return;
    let pr = r, pc = c;
    if (word.direction === 'across') pc--; else pr--;
    const prev = document.getElementById(`cell-${pr}-${pc}`);
    if (prev && prev.classList.contains('active') && !prev.readOnly) prev.focus();
}

function focusNextInWord(r, c, dir) {
    const word = gameState.soal.find(s => s.direction === dir && (
        (dir === 'across' && r === s.row && c >= s.col && c < s.col + s.answer.length) ||
        (dir === 'down'   && c === s.col && r >= s.row && r < s.row + s.answer.length)
    ));
    if (!word) return;
    lastDirection = dir;
    let nr = r, nc = c;
    if (dir === 'across') nc++; else nr++;
    const next = document.getElementById(`cell-${nr}-${nc}`);
    if (next && next.classList.contains('active') && !next.readOnly) next.focus();
}

function focusPrevInWord(r, c, dir) {
    const word = gameState.soal.find(s => s.direction === dir && (
        (dir === 'across' && r === s.row && c > s.col && c <= s.col + s.answer.length) ||
        (dir === 'down'   && c === s.col && r > s.row && r <= s.row + s.answer.length)
    ));
    if (!word) return;
    lastDirection = dir;
    let pr = r, pc = c;
    if (dir === 'across') pc--; else pr--;
    const prev = document.getElementById(`cell-${pr}-${pc}`);
    if (prev && prev.classList.contains('active') && !prev.readOnly) prev.focus();
}

function focusWord(soal) {
    lastDirection = soal.direction;
    // Focus first empty cell, otherwise first cell
    for (let i = 0; i < soal.answer.length; i++) {
        let r = soal.row, c = soal.col;
        if (soal.direction === 'across') c += i; else r += i;
        const input = document.getElementById(`cell-${r}-${c}`);
        if (input && !input.readOnly && !input.value) {
            input.focus();
            return;
        }
    }
    const first = document.getElementById(`cell-${soal.row}-${soal.col}`);
    if (first && !first.readOnly) first.focus();
}

// ────────────────────────────────────────────────
//  LOBBY ENTER KEY
// ────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.getElementById('lobby-screen').classList.contains('active')) {
        joinRoom();
    }
});
