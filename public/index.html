<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrable Fire - Real-time Crossword</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="overlay">
        <div class="auth-card">
            <h1>🔥 SCRABLE FIRE 🔥</h1>
            <div id="auth-forms">
                <div id="login-form">
                    <h2>Login</h2>
                    <input type="text" id="login-username" placeholder="Username">
                    <input type="password" id="login-password" placeholder="Password">
                    <button id="btn-login">Login</button>
                    <p>Belum punya akun? <a href="#" id="show-register">Daftar di sini</a></p>
                </div>
                <div id="register-form" style="display: none;">
                    <h2>Daftar Akun</h2>
                    <input type="text" id="reg-username" placeholder="Username">
                    <input type="password" id="reg-password" placeholder="Password">
                    <button id="btn-register">Daftar</button>
                    <p>Sudah punya akun? <a href="#" id="show-login">Login di sini</a></p>
                </div>
            </div>
            <p id="auth-message" style="color: #ffcc00; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-ui" style="display: none;">
        <header>
            <h1>🔥 SCRABLE FIRE 🔥</h1>
            <div class="user-bar">
                <span id="user-info">Pemain: -</span>
                <button id="btn-logout">Logout</button>
            </div>
        </header>

        <div class="game-container">
            <div id="grid-wrapper">
                <div id="grid"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h2>Leaderboard</h2>
                    <ul id="scores"></ul>
                </div>
                <div class="panel">
                    <h2>Pertanyaan</h2>
                    <div class="clue-list">
                        <div id="clues-across">
                            <h3 style="color: var(--fire-yellow); font-size: 0.9rem;">Mendatar</h3>
                            <ul id="list-across"></ul>
                        </div>
                        <div id="clues-down" style="margin-top: 15px;">
                            <h3 style="color: var(--fire-yellow); font-size: 0.9rem;">Menurun</h3>
                            <ul id="list-down"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
